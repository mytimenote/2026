<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 메시지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--bg:#0f0e0d;
  --border:#2a2720;--text:#f0ece4;--muted:#8a7f6e;--faint:#3a3428;
}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);padding:2rem 1.5rem}
.wrap{width:100%;max-width:360px;text-align:center;animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.cap{font-size:52px;margin-bottom:1.5rem;display:block}
.name{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:600;letter-spacing:-.5px;margin-bottom:.4rem;line-height:1.3}
.cls{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:2.5rem}
.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:52px;margin-bottom:2rem}
.bar{width:3px;border-radius:99px;background:var(--gold);height:4px;opacity:.2}
.waveform.playing .bar{animation:wave 1.2s ease-in-out infinite;opacity:1}
@keyframes wave{0%,100%{height:4px;opacity:.3}50%{height:38px;opacity:1}}
.play-btn{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);background:#1e1c18;color:var(--gold);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;transition:border-color .2s,transform .12s}
.play-btn:hover{border-color:var(--gold);transform:scale(1.05)}
.play-btn:active{transform:scale(.95)}
.play-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.hint{font-size:12px;color:var(--muted);letter-spacing:.5px;min-height:20px}
.hint.err{color:#c96e6e;font-size:12px;line-height:1.8}
.progress{width:100%;height:3px;background:var(--faint);border-radius:99px;margin-bottom:1.5rem;overflow:hidden;display:none}
.progress-bar{height:100%;background:var(--gold);width:0%;transition:width .3s linear;border-radius:99px}
.spin-wrap{margin-bottom:1.5rem}
.spin{display:inline-block;width:28px;height:28px;border:2px solid var(--faint);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:12px;color:var(--muted);margin-top:.75rem}
</style>
</head>
<body>
<div class="wrap">

  <span class="cap">🎓</span>
  <div class="name" id="nameEl">잠시만요…</div>
  <div class="cls"  id="clsEl"></div>

  <div class="waveform" id="wave">
    <div class="bar" style="animation-delay:.00s"></div>
    <div class="bar" style="animation-delay:.08s"></div>
    <div class="bar" style="animation-delay:.16s"></div>
    <div class="bar" style="animation-delay:.24s"></div>
    <div class="bar" style="animation-delay:.32s"></div>
    <div class="bar" style="animation-delay:.40s"></div>
    <div class="bar" style="animation-delay:.48s"></div>
    <div class="bar" style="animation-delay:.40s"></div>
    <div class="bar" style="animation-delay:.32s"></div>
    <div class="bar" style="animation-delay:.24s"></div>
    <div class="bar" style="animation-delay:.16s"></div>
    <div class="bar" style="animation-delay:.08s"></div>
    <div class="bar" style="animation-delay:.00s"></div>
  </div>

  <!-- 로딩 스피너 -->
  <div class="spin-wrap" id="spinWrap">
    <div class="spin"></div>
    <div class="load-txt">음성을 불러오는 중…</div>
  </div>

  <!-- 재생 진행바 -->
  <div class="progress" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <button class="play-btn" id="playBtn" disabled onclick="togglePlay()">▶</button>
  <audio id="player"></audio>

  <div class="hint" id="hintMsg"></div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';

  const p      = new URLSearchParams(location.search);
  const fileId = p.get('f') || '';
  const name   = decodeURIComponent(p.get('n') || '');
  const cls    = decodeURIComponent(p.get('c') || '');

  const nameEl      = document.getElementById('nameEl');
  const clsEl       = document.getElementById('clsEl');
  const player      = document.getElementById('player');
  const wave        = document.getElementById('wave');
  const playBtn     = document.getElementById('playBtn');
  const hintMsg     = document.getElementById('hintMsg');
  const spinWrap    = document.getElementById('spinWrap');
  const progressWrap= document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  if (!fileId) {
    spinWrap.style.display = 'none';
    nameEl.textContent = '잘못된 QR코드입니다';
    clsEl.textContent  = '올바른 QR코드를 스캔해 주세요';
  } else {
    nameEl.textContent = (name || '학생') + '의 졸업 메시지';
    clsEl.textContent  = cls;
    loadAudio();
  }

  async function loadAudio() {
    try {
      // GAS 프록시를 통해 오디오 로드 (CORS 우회 + 권한 문제 해결)
      const res  = await fetch(GAS_URL + '?action=audio&id=' + encodeURIComponent(fileId));
      const data = await res.json();

      if (!data.ok) throw new Error(data.error || '파일 로드 실패');

      // base64 → Blob → ObjectURL
      const binary = atob(data.b64);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob   = new Blob([bytes], { type: data.mime });
      player.src   = URL.createObjectURL(blob);
      player.load();

    } catch (err) {
      spinWrap.style.display = 'none';
      hintMsg.className = 'hint err';
      hintMsg.innerHTML = '음성을 불러올 수 없습니다.<br>잠시 후 다시 시도해 주세요.';
    }
  }

  // 재생 준비 완료
  player.addEventListener('canplay', () => {
    spinWrap.style.display  = 'none';
    progressWrap.style.display = 'block';
    playBtn.disabled        = false;
    hintMsg.className       = 'hint';
    hintMsg.textContent     = '버튼을 눌러 음성을 들어보세요';
    player.play().catch(() => {});
  }, { once: true });

  // 재생 진행바 업데이트
  player.addEventListener('timeupdate', () => {
    if (!player.duration) return;
    progressBar.style.width = (player.currentTime / player.duration * 100) + '%';
  });

  player.addEventListener('error', () => {
    spinWrap.style.display = 'none';
    hintMsg.className = 'hint err';
    hintMsg.textContent = '음성 재생 중 오류가 발생했습니다.';
    playBtn.disabled = true;
  });

  function togglePlay() {
    if (player.paused) { player.play(); }
    else { player.pause(); player.currentTime = 0; }
  }

  player.addEventListener('play',  () => { wave.className='waveform playing'; playBtn.textContent='■'; });
  player.addEventListener('pause', () => { wave.className='waveform'; playBtn.textContent='▶'; });
  player.addEventListener('ended', () => {
    wave.className='waveform';
    playBtn.textContent='▶';
    progressBar.style.width = '0%';
  });
</script>
</body>
</html>

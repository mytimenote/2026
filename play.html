<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neulstudio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#9a6f3f;
  --gold-light:#c9a96e;
  --gold-pale:#e8d5b0;
  --bg:#f5f0e8;
  --bg-card:#fffdf8;
  --bg-deep:#ede6d8;
  --border:#d9c9a8;
  --border-light:#ede0c4;
  --text:#2c2318;
  --text-sub:#6b5740;
  --muted:#9a8570;
  --faint:#c8b899;
}
body{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(201,169,110,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(154,111,63,.08) 0%, transparent 60%);
  font-family:'Noto Sans KR',sans-serif;
  color:var(--text);
  padding:2rem 1.5rem;
}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wave{0%,100%{height:4px;opacity:.25}50%{height:36px;opacity:1}}
@keyframes bloom{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

.wrap{width:100%;max-width:360px;text-align:center;animation:up .55s cubic-bezier(.22,1,.36,1) both}

.deco-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.75rem}
.deco-line span{display:block;height:1px;width:48px;background:linear-gradient(to right,transparent,var(--gold-light))}
.deco-line span:last-child{background:linear-gradient(to left,transparent,var(--gold-light))}
.deco-line i{font-style:normal;font-size:14px;color:var(--gold-light)}

.name{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--text);margin-bottom:.4rem;line-height:1.4}
.cls{font-size:12px;color:var(--muted);font-weight:300;letter-spacing:1.5px;margin-bottom:2.25rem}

.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:48px;margin-bottom:1.75rem}
.bar{width:3px;border-radius:99px;background:var(--gold-light);height:4px;opacity:.25}
.waveform.playing .bar{animation:wave 1.2s ease-in-out infinite;opacity:1}

.play-btn{
  width:64px;height:64px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg-card);color:var(--gold);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.25rem;
  transition:border-color .2s,transform .12s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(154,111,63,.12);
}
.play-btn:hover{border-color:var(--gold-light);transform:scale(1.05);box-shadow:0 4px 20px rgba(154,111,63,.2)}
.play-btn:active{transform:scale(.95)}
.play-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

.progress{width:100%;height:3px;background:var(--border-light);border-radius:99px;margin-bottom:1.5rem;overflow:hidden;display:none}
.progress-bar{height:100%;width:0%;background:linear-gradient(to right,var(--gold-light),var(--gold));border-radius:99px;transition:width .3s linear}

.hint{font-size:12px;color:var(--muted);letter-spacing:.3px;min-height:18px}
.hint.err{color:#b05050;font-size:12px;line-height:1.8}

.spin-wrap{margin-bottom:1.75rem}
.spin{display:inline-block;width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.load-txt{font-size:12px;color:var(--muted);margin-top:.75rem;letter-spacing:.5px}

/* ── 완료 화면 ── */
.done-wrap{display:none;text-align:center;animation:fadeIn .6s ease both}
.done-icon{font-size:58px;display:block;margin-bottom:1.5rem;animation:bloom .6s cubic-bezier(.22,1,.36,1) both}
.done-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:.6rem}
.done-msg{font-size:13px;color:var(--text-sub);line-height:2.1}
.done-divider{width:40px;height:1px;background:var(--faint);margin:1.5rem auto}

.btn-group{display:flex;flex-direction:column;align-items:center;gap:10px}

.replay-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-sub);
  font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;
  transition:border-color .2s,color .2s,box-shadow .2s;
  box-shadow:0 2px 8px rgba(154,111,63,.08);
  width:180px;justify-content:center;
}
.replay-btn:hover{border-color:var(--gold-light);color:var(--gold);box-shadow:0 4px 16px rgba(154,111,63,.15)}
.replay-btn:active{transform:scale(.97)}

/* ── 카톡 닫기 버튼 ── */
.close-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:99px;
  border:1.5px solid var(--border-light);
  background:transparent;
  color:var(--faint);
  font-size:12px;font-family:'Noto Sans KR',sans-serif;font-weight:400;cursor:pointer;
  transition:border-color .2s,color .2s;
  width:180px;justify-content:center;
}
.close-btn:hover{border-color:var(--faint);color:var(--muted)}
.close-btn:active{transform:scale(.97)}

footer{
  text-align:center;font-size:11px;color:var(--faint);
  letter-spacing:.5px;margin-top:2.5rem;
  font-family:'Noto Serif KR',serif;
  font-style:italic;
}
</style>
</head>
<body>
<div class="wrap">

  <!-- 재생 화면 -->
  <div id="playerWrap">
    <div class="deco-line"><span></span><i>✦</i><span></span></div>
    <div class="name" id="nameEl">잠시만요…</div>
    <div class="cls"  id="clsEl"></div>

    <div class="waveform" id="wave">
      <div class="bar" style="animation-delay:.00s"></div>
      <div class="bar" style="animation-delay:.08s"></div>
      <div class="bar" style="animation-delay:.16s"></div>
      <div class="bar" style="animation-delay:.24s"></div>
      <div class="bar" style="animation-delay:.32s"></div>
      <div class="bar" style="animation-delay:.40s"></div>
      <div class="bar" style="animation-delay:.48s"></div>
      <div class="bar" style="animation-delay:.40s"></div>
      <div class="bar" style="animation-delay:.32s"></div>
      <div class="bar" style="animation-delay:.24s"></div>
      <div class="bar" style="animation-delay:.16s"></div>
      <div class="bar" style="animation-delay:.08s"></div>
      <div class="bar" style="animation-delay:.00s"></div>
    </div>

    <div class="spin-wrap" id="spinWrap">
      <div class="spin"></div>
      <div class="load-txt">음성을 불러오는 중…</div>
    </div>

    <div class="progress" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="play-btn" id="playBtn" disabled onclick="togglePlay()">▶</button>
    <audio id="player"></audio>

    <div class="hint" id="hintMsg"></div>

    <footer>소중한 순간은 늘 여기에 ㅣ 늘스튜디오</footer>
  </div>

  <!-- 완료 화면 -->
  <div class="done-wrap" id="doneWrap">
    <div class="deco-line"><span></span><i>✦</i><span></span></div>
    <span class="done-icon">🎓</span>
    <div class="done-title" id="doneTitle"></div>
    <div class="done-msg" id="doneMsg"></div>
    <div class="done-divider"></div>
    <div class="btn-group">
      <button class="replay-btn" onclick="replayAudio()">▶&nbsp;&nbsp;다시 듣기</button>
      <button class="close-btn"  onclick="closeWindow()">✕&nbsp;&nbsp;창 닫기</button>
    </div>
    <footer style="margin-top:2rem">소중한 순간은 늘 여기에 ㅣ 늘스튜디오</footer>
  </div>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';

  const p      = new URLSearchParams(location.search);
  const fileId = p.get('f') || '';
  const name   = decodeURIComponent(p.get('n') || '');
  const cls    = decodeURIComponent(p.get('c') || '');

  const nameEl       = document.getElementById('nameEl');
  const clsEl        = document.getElementById('clsEl');
  const player       = document.getElementById('player');
  const wave         = document.getElementById('wave');
  const playBtn      = document.getElementById('playBtn');
  const hintMsg      = document.getElementById('hintMsg');
  const spinWrap     = document.getElementById('spinWrap');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  const playerWrap   = document.getElementById('playerWrap');
  const doneWrap     = document.getElementById('doneWrap');
  const doneTitle    = document.getElementById('doneTitle');
  const doneMsg      = document.getElementById('doneMsg');

  if (!fileId) {
    spinWrap.style.display = 'none';
    nameEl.textContent = '잘못된 QR코드입니다';
    clsEl.textContent  = '올바른 QR코드를 스캔해 주세요';
  } else {
    nameEl.textContent = (name || '학생') + '의 졸업 메시지';
    clsEl.textContent  = cls;
    loadAudio();
  }

  async function loadAudio() {
    try {
      const res  = await fetch(GAS_URL + '?action=audio&id=' + encodeURIComponent(fileId));
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '파일 로드 실패');
      const binary = atob(data.b64);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      player.src = URL.createObjectURL(new Blob([bytes], { type: data.mime }));
      player.load();
    } catch {
      spinWrap.style.display = 'none';
      hintMsg.className = 'hint err';
      hintMsg.innerHTML = '음성을 불러올 수 없습니다.<br>잠시 후 다시 시도해 주세요.';
    }
  }

  player.addEventListener('canplay', () => {
    spinWrap.style.display     = 'none';
    progressWrap.style.display = 'block';
    playBtn.disabled           = false;
    hintMsg.textContent        = '버튼을 눌러 음성을 들어보세요';
    player.play().catch(() => {});
  }, { once: true });

  player.addEventListener('timeupdate', () => {
    if (!player.duration) return;
    progressBar.style.width = (player.currentTime / player.duration * 100) + '%';
  });

  player.addEventListener('error', () => {
    spinWrap.style.display = 'none';
    hintMsg.className = 'hint err';
    hintMsg.textContent = '음성 재생 중 오류가 발생했습니다.';
    playBtn.disabled = true;
  });

  player.addEventListener('ended', () => {
    wave.className = 'waveform';
    playBtn.textContent = '▶';
    progressBar.style.width = '100%';
    setTimeout(() => {
      playerWrap.style.display = 'none';
      doneWrap.style.display   = 'block';
      doneTitle.textContent    = (name || '학생') + '님의 메시지를 들었어요';
      doneMsg.innerHTML        = '소중한 목소리를 간직해 주셔서 감사합니다.<br>졸업을 진심으로 축하드립니다 🌸';
    }, 600);
  });

  function togglePlay() {
    if (player.paused) { player.play(); }
    else { player.pause(); player.currentTime = 0; }
  }

  function replayAudio() {
    doneWrap.style.display   = 'none';
    playerWrap.style.display = 'block';
    progressBar.style.width  = '0%';
    player.currentTime = 0;
    player.play();
  }

  // 카카오톡 인앱 브라우저에서 창 닫기
  function closeWindow() {
    // 카카오톡 웹뷰 전용 닫기
    if (window.KakaoTalk) {
      window.KakaoTalk.closeWindow();
      return;
    }
    // 일반 window.close (카카오톡 인앱에서도 동작하는 경우 많음)
    window.close();
    // close가 막힌 경우 history back 시도
    setTimeout(() => { history.back(); }, 300);
  }

  player.addEventListener('play',  () => { wave.className='waveform playing'; playBtn.textContent='■'; });
  player.addEventListener('pause', () => { wave.className='waveform'; playBtn.textContent='▶'; });
</script>
</body>
</html>

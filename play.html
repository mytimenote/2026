<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 메시지</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0e0d;
    font-family: 'Noto Sans KR', sans-serif;
    color: #f0ece4;
    padding: 2rem;
  }

  .card {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .year {
    font-size: 11px;
    letter-spacing: 4px;
    color: #8a7f6e;
    margin-bottom: 3rem;
    text-transform: uppercase;
  }

  .icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #1e1c18;
    border: 1px solid #3a3428;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 32px;
  }

  .name {
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: .5rem;
  }

  .class-info {
    font-size: 13px;
    color: #8a7f6e;
    margin-bottom: 2.5rem;
    font-weight: 300;
  }

  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 48px;
    margin-bottom: 2rem;
  }

  .bar {
    width: 3px;
    border-radius: 2px;
    background: #c9a96e;
    animation: wave 1.2s ease-in-out infinite;
  }

  @keyframes wave {
    0%, 100% { height: 6px; opacity: 0.4; }
    50% { height: 36px; opacity: 1; }
  }

  .waveform.paused .bar { animation-play-state: paused; height: 6px; opacity: 0.3; }

  audio {
    width: 100%;
    margin-bottom: 2rem;
    accent-color: #c9a96e;
  }

  audio::-webkit-media-controls-panel { background: #1e1c18; }

  .message {
    font-size: 12px;
    color: #5a5347;
    letter-spacing: 1px;
  }

  .error {
    color: #c96e6e;
    font-size: 14px;
    line-height: 1.7;
    padding: 1.5rem;
    background: #1e1c18;
    border-radius: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="year" id="yearLabel">2025 졸업앨범</div>

  <div class="icon">🎓</div>

  <div class="name" id="studentName">불러오는 중...</div>
  <div class="class-info" id="classInfo"></div>

  <div class="waveform" id="waveform">
    <div class="bar" style="animation-delay:0s"></div>
    <div class="bar" style="animation-delay:.1s"></div>
    <div class="bar" style="animation-delay:.2s"></div>
    <div class="bar" style="animation-delay:.3s"></div>
    <div class="bar" style="animation-delay:.4s"></div>
    <div class="bar" style="animation-delay:.5s"></div>
    <div class="bar" style="animation-delay:.4s"></div>
    <div class="bar" style="animation-delay:.3s"></div>
    <div class="bar" style="animation-delay:.2s"></div>
    <div class="bar" style="animation-delay:.1s"></div>
    <div class="bar" style="animation-delay:0s"></div>
  </div>

  <audio id="player" controls></audio>

  <div class="message" id="footerMsg">재생 버튼을 눌러 음성을 들어보세요</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const student = params.get('student') || '';
  const cls = params.get('class') || '';
  const file = params.get('file') || student;

  const nameEl = document.getElementById('studentName');
  const classEl = document.getElementById('classInfo');
  const player = document.getElementById('player');
  const waveform = document.getElementById('waveform');

  if (!student) {
    nameEl.textContent = '학생 정보 없음';
    document.getElementById('footerMsg').textContent = '올바른 QR코드를 스캔해 주세요';
  } else {
    nameEl.textContent = decodeURIComponent(student) + '의 졸업 메시지';
    classEl.textContent = decodeURIComponent(cls);
    player.src = 'audio/' + decodeURIComponent(file) + '.mp3';
    player.play().catch(() => {});
  }

  player.addEventListener('play', () => waveform.classList.remove('paused'));
  player.addEventListener('pause', () => waveform.classList.add('paused'));
  player.addEventListener('ended', () => waveform.classList.add('paused'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 메시지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--bg:#0f0e0d;--bg-card:#1a1814;
  --border:#2a2720;--text:#f0ece4;--muted:#8a7f6e;--faint:#3a3428;
}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);padding:2rem 1.5rem}
.wrap{width:100%;max-width:360px;text-align:center;animation:up .6s ease both}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.school{font-size:11px;letter-spacing:4px;color:var(--muted);margin-bottom:2.5rem}
.cap{font-size:52px;margin-bottom:1.25rem;display:block;animation:pop .8s ease .3s both}
@keyframes pop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.name{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:600;letter-spacing:-.5px;margin-bottom:.4rem;line-height:1.3}
.cls{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:2.5rem}
.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:52px;margin-bottom:1.5rem}
.bar{width:3px;border-radius:99px;background:var(--gold);height:4px;opacity:.2}
.waveform.playing .bar{animation:wave 1.2s ease-in-out infinite;opacity:1}
@keyframes wave{0%,100%{height:4px;opacity:.3}50%{height:38px;opacity:1}}

/* 재생 버튼 */
.play-btn{width:64px;height:64px;border-radius:50%;border:1px solid #3a3428;background:#1e1c18;color:var(--gold);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;transition:border-color .2s,transform .12s}
.play-btn:hover{border-color:var(--gold);transform:scale(1.05)}
.play-btn:active{transform:scale(.95)}
.play-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

.divider{width:32px;height:1px;background:var(--faint);margin:0 auto 1.5rem}
.hint{font-size:11px;color:var(--faint);letter-spacing:1px}

/* 로딩 */
.loading-msg{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--faint);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.err{display:none;background:#1e1413;border:1px solid #3d2020;border-radius:12px;padding:1.25rem;font-size:13px;color:#c98080;line-height:1.8;margin-bottom:1.5rem}
</style>
</head>
<body>
<div class="wrap">

  <script>
    // ✏️ GAS URL을 입력하세요
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';
  </script>

  <!-- 학교명·연도는 URL 파라미터에서 자동 읽기 -->
  <div class="school" id="schoolLabel"></div>

  <span class="cap">🎓</span>
  <div class="name" id="nameEl">불러오는 중…</div>
  <div class="cls"  id="clsEl"></div>

  <div class="waveform" id="wave">
    <div class="bar" style="animation-delay:.00s"></div>
    <div class="bar" style="animation-delay:.08s"></div>
    <div class="bar" style="animation-delay:.16s"></div>
    <div class="bar" style="animation-delay:.24s"></div>
    <div class="bar" style="animation-delay:.32s"></div>
    <div class="bar" style="animation-delay:.40s"></div>
    <div class="bar" style="animation-delay:.48s"></div>
    <div class="bar" style="animation-delay:.40s"></div>
    <div class="bar" style="animation-delay:.32s"></div>
    <div class="bar" style="animation-delay:.24s"></div>
    <div class="bar" style="animation-delay:.16s"></div>
    <div class="bar" style="animation-delay:.08s"></div>
    <div class="bar" style="animation-delay:.00s"></div>
  </div>

  <div class="err" id="err">
    음성 파일을 불러올 수 없습니다.<br>
    잠시 후 다시 시도해 주세요.
  </div>

  <!-- 로딩 상태 -->
  <div class="loading-msg" id="loadingMsg" style="display:none">
    <span class="spin"></span>음성을 불러오는 중입니다…
  </div>

  <!-- 재생 버튼 (브라우저 기본 컨트롤 대신 사용) -->
  <button class="play-btn" id="playBtn" disabled onclick="togglePlay()">▶</button>
  <audio id="player"></audio>

  <div class="divider"></div>
  <div class="hint" id="hintMsg">음성을 불러오는 중입니다</div>
</div>

<script>
  const p       = new URLSearchParams(location.search);
  const student = p.get('student') || '';
  const cls     = p.get('class')   || '';
  const fileId  = p.get('fileId')  || '';
  const school  = p.get('school')  || '';
  const year    = p.get('year')    || new Date().getFullYear();

  const nameEl      = document.getElementById('nameEl');
  const clsEl       = document.getElementById('clsEl');
  const schoolLabel = document.getElementById('schoolLabel');
  const player      = document.getElementById('player');
  const wave        = document.getElementById('wave');
  const err         = document.getElementById('err');
  const playBtn     = document.getElementById('playBtn');
  const loadingMsg  = document.getElementById('loadingMsg');
  const hintMsg     = document.getElementById('hintMsg');

  // 학교명 · 연도 표시
  schoolLabel.textContent = (school ? decodeURIComponent(school) : '○○초등학교') + ' · ' + year + ' 졸업앨범';

  if (!student || !fileId) {
    nameEl.textContent = '잘못된 QR코드입니다';
    clsEl.textContent  = '올바른 QR코드를 스캔해 주세요';
    hintMsg.textContent = '';
  } else {
    nameEl.textContent = decodeURIComponent(student) + '의 졸업 메시지';
    clsEl.textContent  = decodeURIComponent(cls);
    loadAudio();
  }

  async function loadAudio() {
    loadingMsg.style.display = 'block';
    hintMsg.textContent = '음성을 불러오는 중입니다';
    try {
      const res  = await fetch(GAS_URL + '?action=audio&id=' + encodeURIComponent(fileId));
      const data = await res.json();

      if (!data.success) throw new Error(data.error || '불러오기 실패');

      // base64 → Blob URL 변환 (iOS Safari 포함 모든 브라우저에서 재생 가능)
      const binary = atob(data.data);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob   = new Blob([bytes], { type: data.mimeType });
      player.src   = URL.createObjectURL(blob);

      loadingMsg.style.display = 'none';
      playBtn.disabled = false;
      hintMsg.textContent = '버튼을 눌러 음성을 들어보세요';

      // 자동재생 시도
      player.play().catch(() => {});

    } catch (e) {
      loadingMsg.style.display = 'none';
      err.style.display = 'block';
      hintMsg.textContent = '';
    }
  }

  function togglePlay() {
    if (player.paused) {
      player.play();
    } else {
      player.pause();
      player.currentTime = 0;
    }
  }

  player.addEventListener('play',  () => { wave.className = 'waveform playing'; playBtn.textContent = '■'; });
  player.addEventListener('pause', () => { wave.className = 'waveform'; playBtn.textContent = '▶'; });
  player.addEventListener('ended', () => { wave.className = 'waveform'; playBtn.textContent = '▶'; });
</script>
</body>
</html>

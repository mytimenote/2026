<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 음성 메시지 녹음</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#9a6f3f;
  --gold-light:#c9a96e;
  --gold-pale:#e8d5b0;
  --bg:#f5f0e8;
  --bg-card:#fffdf8;
  --bg-deep:#ede6d8;
  --border:#d9c9a8;
  --border-light:#ede0c4;
  --text:#2c2318;
  --text-sub:#6b5740;
  --muted:#9a8570;
  --faint:#c8b899;
  --red:#b05050;
  --red-bg:#fdf2f2;
  --red-border:#e8c4c4;
  --green:#4a8c62;
  --green-bg:#f2faf5;
  --green-border:#b8ddc8;
  --orange:#b07030;
}
body{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(201,169,110,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(154,111,63,.08) 0%, transparent 60%);
  font-family:'Noto Sans KR',sans-serif;
  color:var(--text);
  padding:2.5rem 1.5rem;
}

@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes wave{0%,100%{height:4px;opacity:.25}50%{height:38px;opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(176,80,80,.2)}50%{box-shadow:0 0 0 12px rgba(176,80,80,0)}}
@keyframes bloom{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.5}}

.wrap{width:100%;max-width:390px;animation:up .55s cubic-bezier(.22,1,.36,1) both}

.deco-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1.5rem}
.deco-line span{display:block;height:1px;width:48px;background:linear-gradient(to right,transparent,var(--gold-light))}
.deco-line span:last-child{background:linear-gradient(to left,transparent,var(--gold-light))}
.deco-line i{font-style:normal;font-size:14px;color:var(--gold-light)}

.school-badge{text-align:center;font-size:11px;letter-spacing:3px;color:var(--muted);margin-bottom:1.25rem;font-weight:300}
h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:.4rem;color:var(--text)}
.sub{font-size:13px;color:var(--muted);text-align:center;font-weight:300;margin-bottom:2rem}

.card{
  background:var(--bg-card);border:1px solid var(--border-light);
  border-radius:18px;padding:1.5rem;margin-bottom:1rem;
  box-shadow:0 2px 16px rgba(154,111,63,.06);
}
.lbl{font-size:10px;letter-spacing:2.5px;color:var(--muted);margin-bottom:8px;display:block;font-weight:500}
input{
  width:100%;padding:11px 14px;background:var(--bg);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;
  transition:border-color .2s,box-shadow .2s;margin-bottom:1.25rem;
}
input:focus{border-color:var(--gold-light);box-shadow:0 0 0 3px rgba(201,169,110,.1)}
input::placeholder{color:var(--faint)}

.class-row{display:flex;align-items:center;gap:8px}
.grade-badge{
  padding:11px 14px;background:var(--bg-deep);
  border:1px solid var(--border);border-radius:10px;
  font-size:13px;color:var(--text-sub);white-space:nowrap;flex-shrink:0;font-weight:500;
}
select{
  flex:1;padding:11px 10px;background:var(--bg);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;
  transition:border-color .2s,box-shadow .2s;
  appearance:none;-webkit-appearance:none;text-align:center;cursor:pointer;
}
select:focus{border-color:var(--gold-light);box-shadow:0 0 0 3px rgba(201,169,110,.1)}
select option{background:var(--bg-card)}

.timer{
  text-align:center;font-size:40px;font-weight:500;
  font-variant-numeric:tabular-nums;letter-spacing:3px;
  transition:color .3s;color:var(--text);
}
.timer.rec{color:var(--red)}
.timer.warn{color:var(--orange);animation:urgentPulse .8s ease-in-out infinite}

.rec-progress{width:100%;height:4px;background:var(--border-light);border-radius:99px;margin:.75rem 0 .25rem;overflow:hidden}
.rec-progress-bar{height:100%;width:0%;border-radius:99px;background:linear-gradient(to right,var(--gold-light),var(--gold));transition:width .5s linear,background .5s}
.rec-progress-bar.warn{background:linear-gradient(to right,#e8a84a,var(--orange))}
.rec-progress-bar.danger{background:linear-gradient(to right,#e06060,var(--red))}

.time-info{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);margin-bottom:1.5rem;letter-spacing:.5px}
.time-remaining{font-weight:500;transition:color .3s}
.time-remaining.warn{color:var(--orange)}
.time-remaining.danger{color:var(--red)}

.status{text-align:center;font-size:12px;color:var(--muted);min-height:20px;letter-spacing:.3px;margin-bottom:1rem}

.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:48px;margin-bottom:1.75rem}
.bar{width:3px;border-radius:99px;background:var(--gold-light);height:4px;opacity:.2;transition:opacity .3s}
.waveform.recording .bar{animation:wave 1s ease-in-out infinite;opacity:1}
.waveform.playing   .bar{animation:wave 1.4s ease-in-out infinite;background:var(--green);opacity:1}

.rec-btn{
  width:70px;height:70px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--bg-card);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.75rem;font-size:26px;
  transition:transform .12s,border-color .2s,box-shadow .2s;
  box-shadow:0 2px 12px rgba(154,111,63,.1);
}
.rec-btn:hover{border-color:var(--gold-light);transform:scale(1.04);box-shadow:0 4px 20px rgba(154,111,63,.18)}
.rec-btn:active{transform:scale(.94)}
.rec-btn.recording{background:var(--red-bg);border-color:var(--red-border);animation:pulse 1.2s ease-in-out infinite}

.btn-row{display:flex;gap:8px;margin-bottom:8px}
.btn{
  flex:1;padding:12px 0;border-radius:10px;border:1.5px solid var(--border);
  font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:500;
  transition:background .15s,border-color .15s,transform .1s,box-shadow .15s;
  background:transparent;color:var(--text-sub);
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-listen{color:var(--green);border-color:var(--green-border);background:var(--green-bg)}
.btn-listen:hover:not(:disabled){background:#e8f5ee;border-color:var(--green)}
.btn-listen.on{border-color:var(--green);box-shadow:0 0 0 3px rgba(74,140,98,.08)}
.btn-retry:hover:not(:disabled){background:var(--bg-deep);border-color:var(--faint)}
.btn-save{background:var(--bg-deep);border-color:var(--gold-light);color:var(--gold)}
.btn-save:hover:not(:disabled){background:var(--gold-pale);border-color:var(--gold);box-shadow:0 2px 12px rgba(154,111,63,.15)}

.alert{border-radius:10px;padding:.875rem 1.25rem;font-size:12px;line-height:1.9;margin-top:.875rem;display:none;text-align:center}
.alert.err{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.alert.load{background:var(--bg-deep);border:1px solid var(--border);color:var(--muted)}
.spin{display:inline-block;width:12px;height:12px;border:1.5px solid var(--faint);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}

/* ── 완료 화면 ── */
.done{display:none;text-align:center;padding:1.5rem 0;animation:fadeIn .6s ease both}
.done .icon{font-size:58px;margin-bottom:1.25rem;display:block;animation:bloom .6s cubic-bezier(.22,1,.36,1) both}
.done .title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:.6rem}
.done-divider{width:40px;height:1px;background:var(--faint);margin:1.5rem auto}
.done .msg{font-size:13px;color:var(--text-sub);line-height:2.2}

footer{text-align:center;font-size:10px;color:var(--faint);letter-spacing:2px;margin-top:2rem}
</style>
</head>
<body>
<div class="wrap">

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';
    const MAX_SEC = 40;
    const params  = new URLSearchParams(location.search);
    const SCHOOL  = decodeURIComponent(params.get('school') || '');
  </script>

  <div class="deco-line"><span></span><i>✦</i><span></span></div>
  <div class="school-badge" id="schoolLabel"></div>
  <h1>졸업 음성 메시지 녹음</h1>
  <p class="sub">소중한 목소리를 남겨주세요 🎤</p>

  <div id="form">

    <div class="card" id="schoolCard" style="display:none">
      <label class="lbl">학교 이름</label>
      <input id="inputSchool" type="text" placeholder="예: ○○초등학교" style="margin-bottom:0" />
    </div>

    <div class="card">
      <label class="lbl">이름</label>
      <input id="inputName" type="text" placeholder="예: 홍길동" />
      <label class="lbl">학반 및 번호</label>
      <div class="class-row">
        <span class="grade-badge">6학년</span>
        <select id="selectBan">
          <option value="">반 ▾</option>
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
          <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
        </select>
        <select id="selectNum">
          <option value="">번호 ▾</option>
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
          <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
          <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option>
          <option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
          <option>21</option><option>22</option><option>23</option><option>24</option><option>25</option>
          <option>26</option><option>27</option><option>28</option><option>29</option><option>30</option>
          <option>31</option><option>32</option><option>33</option><option>34</option><option>35</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="timer" id="timer">00:00</div>
      <div class="rec-progress"><div class="rec-progress-bar" id="recBar"></div></div>
      <div class="time-info">
        <span id="elapsedLbl">0초</span>
        <span class="time-remaining" id="remainLbl">40초 남음</span>
      </div>
      <div class="status" id="status">버튼을 눌러 녹음을 시작하세요</div>

      <button class="rec-btn" id="recBtn" onclick="toggleRecord()">⏺</button>

      <div class="waveform" id="wave">
        <div class="bar" style="animation-delay:.00s"></div>
        <div class="bar" style="animation-delay:.07s"></div>
        <div class="bar" style="animation-delay:.14s"></div>
        <div class="bar" style="animation-delay:.21s"></div>
        <div class="bar" style="animation-delay:.28s"></div>
        <div class="bar" style="animation-delay:.35s"></div>
        <div class="bar" style="animation-delay:.42s"></div>
        <div class="bar" style="animation-delay:.49s"></div>
        <div class="bar" style="animation-delay:.42s"></div>
        <div class="bar" style="animation-delay:.35s"></div>
        <div class="bar" style="animation-delay:.28s"></div>
        <div class="bar" style="animation-delay:.21s"></div>
        <div class="bar" style="animation-delay:.14s"></div>
        <div class="bar" style="animation-delay:.07s"></div>
        <div class="bar" style="animation-delay:.00s"></div>
      </div>

      <audio id="preview"
        onplay="$('wave').className='waveform playing';$('listenBtn').textContent='정지 ■';$('listenBtn').classList.add('on')"
        onpause="$('wave').className='waveform';$('listenBtn').textContent='다시 듣기 ▶';$('listenBtn').classList.remove('on')"
        onended="$('wave').className='waveform';$('listenBtn').textContent='다시 듣기 ▶';$('listenBtn').classList.remove('on')">
      </audio>

      <div class="btn-row">
        <button class="btn btn-listen" id="listenBtn" disabled onclick="toggleListen()">다시 듣기 ▶</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-retry" id="retryBtn" disabled onclick="retry()">다시 녹음</button>
        <button class="btn btn-save"  id="saveBtn"  disabled onclick="save()">저장하기 →</button>
      </div>

      <div class="alert err"  id="alertErr"></div>
      <div class="alert load" id="alertLoad"><span class="spin"></span>저장 중입니다…</div>
    </div>

  </div>

  <!-- 완료 화면 -->
  <div class="done" id="done">
    <span class="icon">🎉</span>
    <div class="title" id="doneTitle"></div>
    <div class="done-divider"></div>
    <div class="msg">
      졸업을 축하해요.<br>
      졸업앨범 QR코드를 스캔하면<br>
      이 목소리를 들을 수 있답니다 🎓
    </div>
  </div>

  <footer>늘스튜디오</footer>
</div>

<script>
  const schoolLabel = document.getElementById('schoolLabel');
  const schoolCard  = document.getElementById('schoolCard');
  if (SCHOOL) {
    schoolLabel.textContent = SCHOOL;
  } else {
    schoolCard.style.display = 'block';
    schoolLabel.textContent  = '졸업앨범 음성 녹음';
  }

  let recorder = null, chunks = [], isRec = false;
  let timerInterval = null, secs = 0, blob = null;
  let mimeType = 'audio/webm';

  const MIMES = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for (const m of MIMES) { if (MediaRecorder.isTypeSupported(m)) { mimeType = m; break; } }

  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2, '0');

  function tick() {
    secs++;
    const remain = MAX_SEC - secs;
    const pct    = (secs / MAX_SEC) * 100;
    $('timer').textContent    = pad(Math.floor(secs / 60)) + ':' + pad(secs % 60);
    $('elapsedLbl').textContent = secs + '초';
    $('remainLbl').textContent  = remain + '초 남음';
    const bar = $('recBar');
    bar.style.width = pct + '%';
    if (remain <= 5) {
      bar.className = 'rec-progress-bar danger';
      $('timer').className     = 'timer rec warn';
      $('remainLbl').className = 'time-remaining danger';
    } else if (remain <= 10) {
      bar.className = 'rec-progress-bar warn';
      $('remainLbl').className = 'time-remaining warn';
    }
    if (secs >= MAX_SEC) {
      stopRec();
      setStatus('40초 제한에 도달해 자동으로 정지됐습니다');
    }
  }

  function resetTimerUI() {
    $('timer').textContent      = '00:00';
    $('timer').className        = 'timer';
    $('elapsedLbl').textContent = '0초';
    $('remainLbl').textContent  = MAX_SEC + '초 남음';
    $('remainLbl').className    = 'time-remaining';
    $('recBar').style.width     = '0%';
    $('recBar').className       = 'rec-progress-bar';
  }

  function getClassName() {
    const ban = $('selectBan').value;
    const num = $('selectNum').value;
    if (!ban || !num) return '';
    return '6학년 ' + ban + '반 ' + num + '번';
  }

  async function toggleRecord() {
    if (!isRec) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        const options = { mimeType, audioBitsPerSecond: 32000 };
        try { recorder = new MediaRecorder(stream, options); }
        catch { recorder = new MediaRecorder(stream, { mimeType }); }
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
          blob = new Blob(chunks, { type: mimeType });
          $('preview').src = URL.createObjectURL(blob);
          $('listenBtn').disabled = false;
          $('retryBtn').disabled  = false;
          $('saveBtn').disabled   = false;
          stream.getTracks().forEach(t => t.stop());
        };
        recorder.start(100);
        isRec = true; secs = 0;
        resetTimerUI();
        $('timer').className    = 'timer rec';
        timerInterval = setInterval(tick, 1000);
        $('recBtn').className   = 'rec-btn recording';
        $('recBtn').textContent = '⏹';
        $('wave').className     = 'waveform recording';
        $('listenBtn').disabled = true;
        $('retryBtn').disabled  = true;
        $('saveBtn').disabled   = true;
        clearAlerts();
        setStatus('녹음 중… 다시 누르면 정지됩니다');
      } catch {
        showErr('마이크 권한이 필요합니다.<br>브라우저에서 마이크 사용을 허용해 주세요.');
      }
    } else {
      stopRec();
    }
  }

  function stopRec() {
    if (!isRec) return;
    recorder.stop(); isRec = false;
    clearInterval(timerInterval);
    $('recBtn').className   = 'rec-btn';
    $('recBtn').textContent = '⏺';
    $('wave').className     = 'waveform';
    if (!$('status').textContent.includes('자동')) {
      setStatus('녹음 완료 — 들어보고 마음에 들면 저장하세요');
    }
  }

  function toggleListen() {
    const audio = $('preview');
    if (audio.paused) { audio.play(); }
    else { audio.pause(); audio.currentTime = 0; }
  }

  function retry() {
    blob = null;
    $('preview').pause();
    $('preview').src = '';
    $('listenBtn').disabled = true;
    $('listenBtn').textContent = '다시 듣기 ▶';
    $('listenBtn').classList.remove('on');
    $('retryBtn').disabled = true;
    $('saveBtn').disabled  = true;
    $('wave').className    = 'waveform';
    resetTimerUI();
    clearAlerts();
    setStatus('버튼을 눌러 다시 녹음하세요');
  }

  async function save() {
    const school    = SCHOOL || $('inputSchool').value.trim();
    const name      = $('inputName').value.trim();
    const className = getClassName();
    if (!school)    return showErr('학교 이름을 입력해 주세요.');
    if (!name)      return showErr('이름을 입력해 주세요.');
    if (!className) return showErr('반과 번호를 선택해 주세요.');
    if (!blob)      return showErr('먼저 녹음을 완료해 주세요.');

    $('preview').pause();
    clearAlerts();
    $('alertLoad').style.display = 'block';
    $('listenBtn').disabled = true;
    $('saveBtn').disabled   = true;
    $('retryBtn').disabled  = true;

    try {
      const base64 = await toBase64(blob);
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify({ school, name, className, audioBase64: base64, mimeType }),
        redirect:'follow'
      });
      const data = await res.json();
      $('alertLoad').style.display = 'none';
      if (data.success) {
        $('form').style.display    = 'none';
        $('doneTitle').textContent = name + '님의 목소리가 저장됐어요!';
        $('done').style.display    = 'block';
      } else {
        throw new Error(data.error || '업로드 실패');
      }
    } catch (err) {
      $('alertLoad').style.display = 'none';
      $('listenBtn').disabled = false;
      $('saveBtn').disabled   = false;
      $('retryBtn').disabled  = false;
      showErr('저장 중 오류가 발생했어요.<br>' + err.message + '<br>잠시 후 다시 시도해 주세요.');
    }
  }

  function toBase64(b) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(b);
    });
  }

  function setStatus(msg) { $('status').textContent = msg; }
  function showErr(msg)   { $('alertErr').innerHTML = msg; $('alertErr').style.display = 'block'; }
  function clearAlerts()  { ['alertErr','alertLoad'].forEach(id => $(id).style.display = 'none'); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>졸업 음성 메시지 녹음</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a96e;--gold-dim:#8a6f3f;
  --bg:#0f0e0d;--bg-card:#1a1814;
  --border:#2a2720;--text:#f0ece4;
  --muted:#8a7f6e;--faint:#3a3428;
  --red:#c96e6e;--red-bg:#1e1413;--red-border:#3d2020;
  --green:#6ec98a;--green-bg:#131e17;--green-border:#1e3d28;
}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--text);padding:2rem 1.5rem}
.wrap{width:100%;max-width:380px;animation:up .5s ease both}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.school{font-size:11px;letter-spacing:4px;color:var(--muted);text-align:center;margin-bottom:2rem}
h1{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:600;text-align:center;margin-bottom:.4rem}
.sub{font-size:13px;color:var(--muted);text-align:center;font-weight:300;margin-bottom:2rem}
.divider{width:32px;height:1px;background:var(--faint);margin:0 auto 2rem}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.lbl{font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:8px;display:block}
input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;margin-bottom:1.25rem}
input:focus{border-color:var(--gold-dim)}
input::placeholder{color:var(--faint)}
input:last-of-type{margin-bottom:0}
.timer{text-align:center;font-size:36px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:2px;margin-bottom:.4rem;transition:color .3s}
.timer.rec{color:var(--red)}
.status{text-align:center;font-size:13px;color:var(--muted);min-height:20px;margin-bottom:1.5rem}
.waveform{display:flex;align-items:center;justify-content:center;gap:4px;height:52px;margin-bottom:1.5rem}
.bar{width:3px;border-radius:99px;background:var(--gold);height:4px;opacity:.2;transition:opacity .3s}
.waveform.recording .bar{animation:wave 1s ease-in-out infinite;opacity:1}
.waveform.playing   .bar{animation:wave 1.4s ease-in-out infinite;background:var(--green);opacity:1}
@keyframes wave{0%,100%{height:4px;opacity:.3}50%{height:40px;opacity:1}}
.rec-btn{width:68px;height:68px;border-radius:50%;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;transition:transform .12s,border-color .2s;background:#231f16;font-size:26px}
.rec-btn:hover{border-color:var(--gold-dim);transform:scale(1.04)}
.rec-btn:active{transform:scale(.95)}
.rec-btn.recording{background:var(--red-bg);border-color:var(--red-border);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,110,110,.25)}50%{box-shadow:0 0 0 10px rgba(201,110,110,0)}}
audio{width:100%;border-radius:8px;accent-color:var(--gold);margin-bottom:1rem;display:none}
.btns{display:flex;gap:8px}
.btn{flex:1;padding:11px 0;border-radius:10px;border:1px solid var(--border);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:500;transition:background .15s,border-color .15s,transform .1s;background:transparent;color:var(--text)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-retry:hover:not(:disabled){background:#1e1c18}
.btn-save{background:#231f16;border-color:var(--gold-dim);color:var(--gold)}
.btn-save:hover:not(:disabled){background:#2a2415;border-color:var(--gold)}
.alert{border-radius:10px;padding:1rem 1.25rem;font-size:13px;line-height:1.8;margin-top:1rem;display:none;text-align:center}
.alert.err{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.alert.ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.alert.load{background:#161513;border:1px solid var(--border);color:var(--muted)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--faint);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.done{display:none;text-align:center;padding:2rem 0}
.done .icon{font-size:56px;margin-bottom:1rem;display:block}
.done .title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;margin-bottom:.75rem}
.done .msg{font-size:13px;color:var(--muted);line-height:2}
.btn-more{margin-top:2rem;padding:10px 24px;border:1px solid var(--border);border-radius:99px;font-size:13px;color:var(--muted);background:transparent;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s,color .2s}
.btn-more:hover{border-color:var(--gold-dim);color:var(--gold)}
footer{text-align:center;font-size:11px;color:var(--faint);letter-spacing:2px;margin-top:2rem}
</style>
</head>
<body>
<div class="wrap">

  <!--
  ✏️ GAS_URL 을 배포한 Google Apps Script 웹 앱 URL로 교체하세요
     URL 파라미터 ?school=학교명 을 붙여서 링크 공유하면
     학교 이름 입력 없이 자동 설정됩니다.
  -->
  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCIUMBHvu0YU77z4ULqrZAez6bue3cWi7Fzyg5slz-FdIY05K1EclHCRDUdcBoxXbPuQ/exec';
    const params  = new URLSearchParams(location.search);
    const SCHOOL  = decodeURIComponent(params.get('school') || '');
  </script>

  <div class="school" id="schoolLabel"></div>
  <h1>졸업 음성 메시지 녹음</h1>
  <p class="sub">소중한 목소리를 남겨주세요 🎤</p>
  <div class="divider"></div>

  <div id="form">
    <!-- 학교명 입력 (URL 파라미터 없을 때만 표시) -->
    <div class="card" id="schoolCard" style="display:none">
      <label class="lbl">학교 이름</label>
      <input id="inputSchool" type="text" placeholder="예: ○○초등학교" />
    </div>

    <div class="card">
      <label class="lbl">이름</label>
      <input id="inputName" type="text" placeholder="예: 홍길동" />
      <label class="lbl">학반 및 번호</label>
      <input id="inputClass" type="text" placeholder="예: 6학년 3반 15번" />
    </div>

    <div class="card">
      <div class="timer" id="timer">00:00</div>
      <div class="status" id="status">버튼을 눌러 녹음을 시작하세요</div>

      <button class="rec-btn" id="recBtn" onclick="toggleRecord()">⏺</button>

      <div class="waveform" id="wave">
        <div class="bar" style="animation-delay:.00s"></div>
        <div class="bar" style="animation-delay:.07s"></div>
        <div class="bar" style="animation-delay:.14s"></div>
        <div class="bar" style="animation-delay:.21s"></div>
        <div class="bar" style="animation-delay:.28s"></div>
        <div class="bar" style="animation-delay:.35s"></div>
        <div class="bar" style="animation-delay:.42s"></div>
        <div class="bar" style="animation-delay:.49s"></div>
        <div class="bar" style="animation-delay:.42s"></div>
        <div class="bar" style="animation-delay:.35s"></div>
        <div class="bar" style="animation-delay:.28s"></div>
        <div class="bar" style="animation-delay:.21s"></div>
        <div class="bar" style="animation-delay:.14s"></div>
        <div class="bar" style="animation-delay:.07s"></div>
        <div class="bar" style="animation-delay:.00s"></div>
      </div>

      <audio id="preview"
        onplay="wave.className='waveform playing'"
        onpause="wave.className='waveform'"
        onended="wave.className='waveform'"></audio>

      <div class="btns">
        <button class="btn btn-retry" id="retryBtn" disabled onclick="retry()">다시 녹음</button>
        <button class="btn btn-save"  id="saveBtn"  disabled onclick="save()">저장하기 →</button>
      </div>

      <div class="alert err"  id="alertErr"></div>
      <div class="alert load" id="alertLoad"><span class="spin"></span>저장 중입니다…</div>
    </div>
  </div>

  <!-- 완료 화면 -->
  <div class="done" id="done">
    <span class="icon">🎉</span>
    <div class="title" id="doneTitle"></div>
    <div class="msg">
      녹음이 저장됐어요!<br>
      졸업앨범 QR코드를 스캔하면<br>
      이 목소리를 들을 수 있답니다 🎓
    </div>
    <button class="btn-more" onclick="reset()">다른 학생 녹음하기</button>
  </div>

  <footer id="footer"></footer>
</div>

<script>
  // 학교명 초기화
  const schoolLabel = document.getElementById('schoolLabel');
  const schoolCard  = document.getElementById('schoolCard');
  if (SCHOOL) {
    schoolLabel.textContent = SCHOOL;
  } else {
    schoolCard.style.display = 'block';
    schoolLabel.textContent  = '졸업앨범 음성 녹음';
  }

  let recorder = null, chunks = [], isRec = false;
  let timerInterval = null, secs = 0, blob = null;
  let mimeType = 'audio/webm';

  const MIMES = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for (const m of MIMES) { if (MediaRecorder.isTypeSupported(m)) { mimeType = m; break; } }

  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2,'0');

  function tick() {
    secs++;
    $('timer').textContent = pad(Math.floor(secs/60))+':'+pad(secs%60);
  }

  async function toggleRecord() {
    if (!isRec) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        recorder = new MediaRecorder(stream, { mimeType });
        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
          blob = new Blob(chunks, { type: mimeType });
          $('preview').src = URL.createObjectURL(blob);
          $('preview').style.display = 'block';
          $('retryBtn').disabled = false;
          $('saveBtn').disabled  = false;
          stream.getTracks().forEach(t => t.stop());
          setStatus('녹음 완료 — 들어보고 마음에 들면 저장하세요');
        };
        recorder.start(100);
        isRec = true; secs = 0;
        $('timer').textContent = '00:00';
        $('timer').className = 'timer rec';
        timerInterval = setInterval(tick, 1000);
        $('recBtn').className = 'rec-btn recording';
        $('recBtn').textContent = '⏹';
        $('wave').className = 'waveform recording';
        $('preview').style.display = 'none';
        $('retryBtn').disabled = true;
        $('saveBtn').disabled  = true;
        clearAlerts();
        setStatus('녹음 중… 다시 누르면 정지됩니다');
      } catch {
        showErr('마이크 권한이 필요합니다.<br>브라우저에서 마이크 사용을 허용해 주세요.');
      }
    } else {
      stopRec();
    }
  }

  function stopRec() {
    if (!isRec) return;
    recorder.stop(); isRec = false;
    clearInterval(timerInterval);
    $('recBtn').className = 'rec-btn';
    $('recBtn').textContent = '⏺';
    $('timer').className = 'timer';
    $('wave').className = 'waveform';
  }

  function retry() {
    blob = null;
    $('preview').style.display = 'none';
    $('preview').src = '';
    $('retryBtn').disabled = true;
    $('saveBtn').disabled  = true;
    $('timer').textContent = '00:00';
    clearAlerts();
    setStatus('버튼을 눌러 다시 녹음하세요');
  }

  async function save() {
    const school    = SCHOOL || $('inputSchool').value.trim();
    const name      = $('inputName').value.trim();
    const className = $('inputClass').value.trim();
    if (!school)    return showErr('학교 이름을 입력해 주세요.');
    if (!name)      return showErr('이름을 입력해 주세요.');
    if (!className) return showErr('학반 정보를 입력해 주세요.');
    if (!blob)      return showErr('먼저 녹음을 완료해 주세요.');

    clearAlerts();
    $('alertLoad').style.display = 'block';
    $('saveBtn').disabled  = true;
    $('retryBtn').disabled = true;

    try {
      const base64 = await toBase64(blob);
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify({ school, name, className, audioBase64: base64, mimeType }),
        redirect:'follow'
      });
      const data = await res.json();
      $('alertLoad').style.display = 'none';
      if (data.success) {
        $('form').style.display = 'none';
        $('doneTitle').textContent = name + '님의 목소리가 저장됐어요!';
        $('done').style.display = 'block';
      } else {
        throw new Error(data.error || '업로드 실패');
      }
    } catch (err) {
      $('alertLoad').style.display = 'none';
      $('saveBtn').disabled  = false;
      $('retryBtn').disabled = false;
      showErr('저장 중 오류가 발생했어요.<br>' + err.message + '<br>잠시 후 다시 시도해 주세요.');
    }
  }

  function toBase64(b) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(b);
    });
  }

  function reset() {
    blob = null; secs = 0;
    ['inputName','inputClass'].forEach(id => $(id) && ($(id).value = ''));
    if ($('inputSchool')) $('inputSchool').value = '';
    $('timer').textContent = '00:00';
    $('preview').style.display = 'none';
    $('preview').src = '';
    $('retryBtn').disabled = true;
    $('saveBtn').disabled  = true;
    $('wave').className = 'waveform';
    clearAlerts();
    setStatus('버튼을 눌러 녹음을 시작하세요');
    $('done').style.display = 'none';
    $('form').style.display = 'block';
  }

  function setStatus(msg) { $('status').textContent = msg; }
  function showErr(msg)   { $('alertErr').innerHTML = msg; $('alertErr').style.display = 'block'; }
  function clearAlerts()  { ['alertErr','alertLoad'].forEach(id => $(id).style.display = 'none'); }
</script>
</body>
</html>
